name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QTop.slnx

      - name: Build
        run: >
          dotnet build QTop.slnx
          --configuration Release
          --no-restore
          --disable-build-servers
          /m:1
          /p:BuildInParallel=false
          -p:UseSharedCompilation=false

      - name: Test
        run: dotnet test QTop.slnx --configuration Release --no-build --disable-build-servers

      - name: Publish app
        run: >
          dotnet publish QTop/QTop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=false
          -p:UseSharedCompilation=false
          --disable-build-servers
          --output artifacts/publish/QTop/Release/win-x64

      - name: Build MSI
        run: dotnet build QTop.Installer/QTop.Installer.wixproj --configuration Release

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: QTop-win-x64
          path: artifacts/publish/QTop/Release/win-x64/

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: QTop-installer
          path: QTop.Installer/bin/x64/Release/QTop-*.msi
